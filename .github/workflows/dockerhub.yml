name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout bundle repo
        uses: actions/checkout@v4
        with:
          path: bundle

      - name: Checkout video-cuter repo
        uses: actions/checkout@v4
        with:
          repository: tomfocker/video-cuter
          path: video-cuter

      - name: Checkout funasr-server repo
        uses: actions/checkout@v4
        with:
          repository: tomfocker/funasr-server
          path: funasr-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata for video-cuter
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/video-cuter
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Metadata for funasr-server
        id: meta_asr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/funasr-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Metadata for gateway
        id: meta_gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/video-cuter-suite-gateway
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push video-cuter
        uses: docker/build-push-action@v6
        with:
          context: ./video-cuter
          file: ./video-cuter/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Build and push funasr-server
        uses: docker/build-push-action@v6
        with:
          context: ./funasr-server
          file: ./funasr-server/Dockerfile
          push: true
          tags: ${{ steps.meta_asr.outputs.tags }}
          labels: ${{ steps.meta_asr.outputs.labels }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          file: ./bundle/Dockerfile
          push: true
          tags: ${{ steps.meta_gateway.outputs.tags }}
          labels: ${{ steps.meta_gateway.outputs.labels }}
